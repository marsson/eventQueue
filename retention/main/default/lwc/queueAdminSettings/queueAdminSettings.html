<template>
    <div class="slds-var-p-around_medium">
        <template if:true={loading}>
            <lightning-spinner alternative-text="Loading…"></lightning-spinner>
        </template>
        <template if:true={errorMessage}>
            <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error">{errorMessage}</div>
        </template>
        <template if:true={savedMessage}>
            <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_success">{savedMessage}</div>
        </template>

        <div class="slds-grid slds-gutters slds-wrap">
            <div class="slds-col slds-size_1-of-1 slds-var-m-bottom_medium">
                <lightning-card title="Queue Admin">
                    <div class="slds-var-p-around_medium">
                        <lightning-input type="checkbox" label="Retention enabled"
                                         data-field="IsRetentionEnabled__c"
                                         checked={queueAdmin.IsRetentionEnabled__c}
                                         onchange={handleQueueAdminChange}></lightning-input>
                        <lightning-input type="checkbox" label="Global dry run (overrides every policy)"
                                         data-field="GlobalDryRun__c"
                                         checked={queueAdmin.GlobalDryRun__c}
                                         onchange={handleQueueAdminChange}></lightning-input>
                        <lightning-input type="number" label="Max records per cycle (global cap)"
                                         data-field="MaxRecordsPerRun__c"
                                         value={queueAdmin.MaxRecordsPerRun__c}
                                         onchange={handleQueueAdminChange}></lightning-input>
                        <lightning-input type="number" label="Chunk size (batch scope)"
                                         data-field="ChunkSize__c"
                                         value={queueAdmin.ChunkSize__c}
                                         onchange={handleQueueAdminChange}
                                         max="2000"></lightning-input>
                        <lightning-input type="number" label="Log retention (days)"
                                         data-field="LogRetentionDays__c"
                                         value={queueAdmin.LogRetentionDays__c}
                                         onchange={handleQueueAdminChange}></lightning-input>
                        <lightning-input type="checkbox" label="Empty recycle bin after delete"
                                         data-field="EmptyRecycleBin__c"
                                         checked={queueAdmin.EmptyRecycleBin__c}
                                         onchange={handleQueueAdminChange}
                                         field-level-help="When OFF (default), deleted rows stay recoverable for 15 days via Setup → Recycle Bin."></lightning-input>
                        <div class="slds-var-m-top_small">
                            <lightning-button label="Save" variant="brand" onclick={saveQueueAdmin}></lightning-button>
                        </div>
                    </div>
                </lightning-card>
            </div>

            <div class="slds-col slds-size_1-of-1 slds-var-m-bottom_medium">
                <lightning-card title="Notifier + Logger registrations">
                    <div class="slds-var-p-around_medium slds-text-body_small slds-text-color_weak">
                        Notifier and logger implementations are managed on their dedicated tabs.
                        Each tab supports registering multiple classes with instant on/off toggles — no deploys needed.
                        With zero active logger registrations, the framework falls back to the shipped <code>DebugLogger</code> (System.debug).
                    </div>
                </lightning-card>
            </div>

            <div class="slds-col slds-size_1-of-1">
                <lightning-card title="Danger zone" icon-name="utility:warning">
                    <div class="slds-var-p-around_medium">
                        <p class="slds-var-m-bottom_small">
                            Aborts every registered cron job across all four <code>Job*</code> classes. Use when cleaning up for redeployment.
                        </p>
                        <lightning-button label="Abort all jobs" variant="destructive" onclick={abortAllJobs}></lightning-button>
                    </div>
                </lightning-card>
            </div>
        </div>
    </div>
</template>
