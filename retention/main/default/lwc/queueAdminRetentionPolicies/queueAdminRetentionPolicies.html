<template>
    <div class="slds-var-p-around_medium">
        <template if:true={loading}>
            <lightning-spinner alternative-text="Loading…"></lightning-spinner>
        </template>

        <template if:true={errorMessage}>
            <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error">{errorMessage}</div>
        </template>

        <lightning-card title="Retention Policies">
            <div slot="actions">
                <lightning-button label="New policy" icon-name="utility:add" variant="brand" onclick={handleNew}></lightning-button>
                <lightning-button label="Refresh" icon-name="utility:refresh" class="slds-var-m-left_x-small" onclick={loadPolicies}></lightning-button>
            </div>

            <template if:true={previewResult}>
                <div class="slds-var-m-around_medium slds-box slds-theme_info">{previewResult}</div>
            </template>
            <template if:true={deploymentMessage}>
                <div class="slds-var-m-around_medium slds-box">{deploymentMessage}</div>
            </template>

            <lightning-datatable
                data={policies}
                columns={columns}
                key-field="developerName"
                hide-checkbox-column
                onrowaction={handleRowAction}>
            </lightning-datatable>
        </lightning-card>

        <!-- New / Edit modal -->
        <template if:true={showModal}>
            <section role="dialog" class="slds-modal slds-fade-in-open slds-modal_medium">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close" onclick={handleCloseModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title slds-hyphenate">Retention policy</h2>
                    </header>
                    <div class="slds-modal__content slds-var-p-around_medium">
                        <template if:true={deploying}>
                            <lightning-spinner alternative-text="Deploying…"></lightning-spinner>
                        </template>

                        <div class="slds-box slds-theme_info slds-var-m-bottom_small" role="note">
                            <strong>Note:</strong> the Metadata API does not support deleting
                            individual custom metadata records from Apex. To delete a policy,
                            go to <em>Setup → Custom Metadata Types → Queue Retention Policy →
                            Manage Records → Del</em>.
                        </div>

                        <lightning-input label="Developer Name" data-field="developerName" value={editForm.developerName} onchange={handleModalChange} required></lightning-input>
                        <lightning-input label="Label" data-field="label" value={editForm.label} onchange={handleModalChange} required></lightning-input>
                        <lightning-combobox label="Status" data-field="status" value={editForm.status} options={statusOptions} onchange={handleModalChange} required></lightning-combobox>
                        <lightning-input type="number" label="Retention Days" data-field="retentionDays" value={editForm.retentionDays} min="1" onchange={handleModalChange} required></lightning-input>
                        <lightning-input type="number" label="Max Delete Per Run" data-field="maxDeletePerRun" value={editForm.maxDeletePerRun} min="1" onchange={handleModalChange} required></lightning-input>
                        <lightning-input type="checkbox" label="Is Active" data-field="isActive" checked={editForm.isActive} onchange={handleModalChange}></lightning-input>
                        <lightning-input type="checkbox" label="Dry Run" data-field="dryRun" checked={editForm.dryRun} onchange={handleModalChange}></lightning-input>
                        <lightning-textarea label="Notes" data-field="notes" value={editForm.notes} onchange={handleModalChange}></lightning-textarea>

                        <template if:true={deploymentMessage}>
                            <div class="slds-var-m-top_medium slds-box">{deploymentMessage}</div>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={handleCloseModal} class="slds-var-m-right_x-small"></lightning-button>
                        <lightning-button label="Save &amp; deploy" variant="brand" onclick={handleSave} disabled={deploying}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
